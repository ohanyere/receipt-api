apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: receipt-api-alerts
  labels:
    app.kubernetes.io/name: receipt-api
    release: prometheus
spec:
  groups:
    - name: receipt-api.availability
      rules:
        - alert: receipt-apiHighErrorRate
          expr: sum(rate(http_requests_total{service="receipt-api",status=~"5.."}[5m])) / sum(rate(http_requests_total{service="receipt-api"}[5m])) > 0.05
          for: 10m
          labels:
            severity: warning
            team: Commerce
          annotations:
            summary: receipt-api has elevated 5xx responses.
            runbook_url: docs/RUNBOOK.md
        - alert: receipt-apiUnavailable
          expr: up{job="receipt-api"} == 0
          for: 5m
          labels:
            severity: critical
            team: Commerce
          annotations:
            summary: receipt-api is not being scraped or is unavailable.
            runbook_url: docs/RUNBOOK.md
