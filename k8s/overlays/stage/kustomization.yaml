apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: receipt-api-stage
resources:
  - ../../base
nameSuffix: -stage
labels:
  - includeSelectors: false
    includeTemplates: true
    pairs:
      platform.ohanyere.io/environment: stage
      platform.io/environment: stage
patches:
  - path: rollout-patch.yaml
  - path: hpa-patch.yaml
images:
  - name: kuberpull/receipt-api
    newTag: stage
