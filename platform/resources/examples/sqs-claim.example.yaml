apiVersion: messaging.platform.ohanyere.io/v1alpha1
kind: SQSQueueClaim
metadata:
  name: receipt-api-queue
  labels:
    app.kubernetes.io/name: receipt-api
    finops.ohanyere.io/cost-center: commerce
spec:
  environment: dev
  visibilityTimeoutSeconds: 30
  messageRetentionSeconds: 345600
  deadLetterQueue:
    enabled: true
    maxReceiveCount: 5
